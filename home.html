<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Home</title>

    <!-- tailwind and daisy link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font-awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-100">

    <!-- navbar -->
    <nav>
       <div class="navbar   bg-base-100 shadow-sm">
        <div class="flex-1">
        <div class="flex">
            <div class="w-10 rounded-full">
            <img
                alt="Tailwind CSS Navbar component"
                src="./assets/github-logo.png" />
            </div>
            <a class="btn btn-ghost text-lg md:text-xl">Github Issue Tracker</a>
        </div>
  </div>
  <div class="flex gap-2 ">
    <!-- search input -->
        <label class="input  w-[100px] md:w-full max-w-md">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="searchInput" type="search" required placeholder="Search  Issues" />
        </label>
            <button id="search-btn" class="btn btn-primary">Search</button>
        </div>
     </div>
    </nav>


    <main class="w-10/12 mx-auto">
    <!-- main tabs -->
        <div class="flex gap-2  mt-20 bg-white p-4 rounded shadow-xs">
            <button id="all-btn" onclick="togglebtn('all-btn')" class="btn btn-primary min-w-[100px]">All</button>
            <button id="open-btn"  onclick="togglebtn('open-btn')"    class="btn  min-w-[100px] ">Open</button>
            <button id="close-btn" onclick="togglebtn('close-btn')"   class="btn  min-w-[100px]">Closed</button>
         </div>

    <!-- main section -->
         <section class=" bg-white my-4 rounded">

            <!-- loading spinner -->
            <div id="loading-spinner" class="flex  justify-center ">
                <span class="loading loading-dots loading-xl"></span>
            </div>

            <!-- count and open and closed sign -->
            <div class="flex justify-between items-center p-3 mt-4 border-b border-gray-400 ">
                <!-- card count div -->
                <div class="flex gap-2 items-center">
                    <div class="border border-[#570DF8] w-10 h-10 rounded-full bg-purple-100 p-1 flex ">
                    <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div class=" ">
                        <h3 class="text-xl font-semibold md:text-2xl"><span id="card-count">50</span> Issues</h3>
                        <p class="text-xs font-semibold md:text-sm">Track and manage your project issues</p>
                    </div>
                    
                </div>
                <!-- open and closed sign -->
                <div class="flex  gap-3 font-semibold text-sm md:text-sm md:mx-8 md:gap-6">
                    <p><i class="fa-solid fa-circle text-emerald-600"></i> Open</p>
                    <p><i class="fa-solid fa-circle text-purple-600"></i> Closed</p>
                </div>
            </div>

            <!-- card-container -->
             <div id="card-container" class="my-4 grid gap-4 justify-center lg:grid-cols-4 sm:grid-cols-2 md:p-3">
                <!-- card demo -->
                 
                 
             </div>
        </section>

        
            <!-- Open the modal using ID.showModal() method -->

    <dialog id="card-detail-modal" class="modal">
    
    </dialog>
       
    </main>

    <script src="./script/home.js"></script>
</body>
</html>
